services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    # network_mode: host is required for the Victron Bluetooth plugin —
    # BlueZ/D-Bus BLE access from inside a container generally doesn't
    # work with Docker's default bridge networking. Under host
    # networking there's no port mapping/translation at all - the
    # backend binds directly to the host's own network interfaces on
    # port 8000, same as if it were running outside Docker entirely.
    # (No "ports:" section here on purpose - Compose warns if you add
    # one, since host mode makes it meaningless.)
    #
    # Confirmed working against real hardware: connected to an actual
    # Victron SmartSolar MPPT over Bluetooth from inside this container
    # on a Raspberry Pi 2. See docs/victron_ble_integration.md if it
    # doesn't work on a different setup.
    network_mode: host
    # /dev/video0 passthrough is for the USB webcam (app/services/
    # camera_service.py uses ffmpeg to capture from it directly) -
    # harmless if no webcam is attached, the camera endpoint just
    # returns a clear 503 rather than the whole backend failing.
    devices:
      - "${WEBCAM_DEVICE:-/dev/video0}:${WEBCAM_DEVICE:-/dev/video0}"
    volumes:
      - vanos-data:/app/data
      - /var/run/dbus:/var/run/dbus
      # Read-only /sys, for the 1-Wire temperature sensor plugin
      # (DS18B20). The kernel exposes each detected probe under
      # /sys/bus/w1/devices/, but those entries are symlinks into
      # /sys/devices/w1_bus_master1/ - mounting the two paths
      # individually would break container startup entirely on any
      # system without 1-Wire enabled (Docker can't create a missing
      # path under sysfs), so the whole tree is mounted read-only
      # instead. Harmless when no sensors are present: the plugin just
      # finds nothing and reports that cleanly.
      - /sys:/sys:ro
    environment:
      VANOS_ENVIRONMENT: production
      VANOS_DATABASE_URL: sqlite:///./data/vanos.db
      WEBCAM_DEVICE: ${WEBCAM_DEVICE:-/dev/video0}
      APP_ACCESS_PASSWORD: ${APP_ACCESS_PASSWORD:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_RECOMMENDATIONS_MODEL: ${AI_RECOMMENDATIONS_MODEL:-claude-haiku-4-5-20251001}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - "8090:80"
    # nginx proxies /api and /ws to the backend, which runs with
    # network_mode: host - so it's reached via the host gateway rather
    # than a compose service name.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: only starts doing anything useful once CLOUDFLARE_TUNNEL_TOKEN
  # is set in a root .env file. Gives the app a real public HTTPS URL on
  # your own domain without opening any ports on your router - works
  # behind CGNAT, since it's an outbound-only connection to Cloudflare.
  # See docs/remote_access_cloudflare_tunnel.md for full setup.
  #
  # NOTE on 32-bit ARM (Raspberry Pi 2/3 running 32-bit Raspberry Pi OS):
  # Cloudflare publishes no official armv7 image. Override
  # CLOUDFLARED_IMAGE in .env with an unofficial multi-arch build.
  # Be aware cloudflared is also reported to segfault on Pi Zero W / 1B /
  # 2B specifically - see the docs for alternatives if that happens.
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    # Host networking is required: the tunnel's routes point at
    # localhost:8090 (frontend) and localhost:8000 (backend). Under
    # default bridge networking, "localhost" would mean the cloudflared
    # container itself - where nothing is listening - producing a 502
    # Bad Gateway even though the tunnel connects fine. Host networking
    # makes localhost mean the Pi, which is what the routes expect.
    network_mode: host
    restart: unless-stopped
    profiles:
      - cloudflare-tunnel

volumes:
  vanos-data:
