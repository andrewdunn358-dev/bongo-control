services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    # network_mode: host is required for the Victron Bluetooth plugin —
    # BlueZ/D-Bus BLE access from inside a container generally doesn't
    # work with Docker's default bridge networking. Under host
    # networking there's no port mapping/translation at all - the
    # backend binds directly to the host's own network interfaces on
    # port 8000, same as if it were running outside Docker entirely.
    # (No "ports:" section here on purpose - Compose warns if you add
    # one, since host mode makes it meaningless.)
    #
    # Confirmed working against real hardware: connected to an actual
    # Victron SmartSolar MPPT over Bluetooth from inside this container
    # on a Raspberry Pi 2. See docs/victron_ble_integration.md if it
    # doesn't work on a different setup.
    network_mode: host
    volumes:
      - vanos-data:/app/data
      - /var/run/dbus:/var/run/dbus
    environment:
      VANOS_ENVIRONMENT: production
      VANOS_DATABASE_URL: sqlite:///./data/vanos.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      # Set these two in a root .env file (gitignored) to your actual
      # domain - e.g. VITE_API_URL=https://bongo-api.yourdomain.com and
      # VITE_WS_URL=wss://bongo-api.yourdomain.com/ws/telemetry - only
      # needed if you're using Cloudflare Tunnel for remote HTTPS access.
      # Left unset, everything works exactly as before (derives the
      # backend address from whatever hostname/IP you're browsing to).
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    ports:
      - "8090:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Optional: only starts doing anything useful once CLOUDFLARE_TUNNEL_TOKEN
  # is set in a root .env file. Gives the app a real public HTTPS URL on
  # your own domain without opening any ports on your router - works
  # behind CGNAT, since it's an outbound-only connection to Cloudflare.
  # See docs/remote_access_cloudflare_tunnel.md for full setup.
  #
  # NOTE on 32-bit ARM (Raspberry Pi 2/3 running 32-bit Raspberry Pi OS):
  # Cloudflare publishes no official armv7 image. Override
  # CLOUDFLARED_IMAGE in .env with an unofficial multi-arch build.
  # Be aware cloudflared is also reported to segfault on Pi Zero W / 1B /
  # 2B specifically - see the docs for alternatives if that happens.
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:latest}
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    profiles:
      - cloudflare-tunnel

volumes:
  vanos-data:
