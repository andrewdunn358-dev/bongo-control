## go2rtc config - relay for a USB webcam connected directly to the Pi.
#
# Originally set up for a Tapo C113 over RTSP - switched to a direct
# USB webcam instead (the Tapo moved to house use). go2rtc supports
# USB cameras natively via its v4l2 source, no separate tool needed -
# same well-tested go2rtc already confirmed working here, just pointed
# at a different source.
#
# ${VAR:default} substitution is go2rtc's own built-in feature (reads
# real environment variables passed to the container) - this file is
# safe to commit either way, no secrets in it now that it's a local
# USB device rather than RTSP credentials.
#
# input_format=mjpeg is deliberate, not arbitrary: most USB webcams
# support both raw YUYV and compressed MJPEG capture, and MJPEG uses
# far less USB bandwidth - matters on a Pi 2. Check what your specific
# webcam actually supports with:
#   v4l2-ctl --list-formats -d /dev/video0
# and adjust here if it doesn't list MJPG.
streams:
  cctv: v4l2:device?video=${WEBCAM_DEVICE:/dev/video0}&input_format=mjpeg

  # Previous Tapo RTSP setup, kept as a commented reference in case a
  # second camera gets added back later:
  # cctv2: rtsp://${TAPO_CAMERA_USER}:${TAPO_CAMERA_PASS}@${TAPO_CAMERA_IP}:554/stream2

api:
  listen: ":1984"
  origin: "*"
  # Lets go2rtc generate its internal links/API calls correctly when
  # served behind nginx under /camera, rather than assuming it owns
  # the whole origin - the documented mechanism for exactly this.
  base_path: "/camera"

webrtc:
  listen: ":8555"
