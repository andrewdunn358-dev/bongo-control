server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy the API and WebSocket through the SAME origin the app is
    # served from. This is what makes the dashboard work identically on
    # the van's LAN (no internet) and through a Cloudflare Tunnel - the
    # frontend uses relative paths and never needs to know an absolute
    # backend address, so there's nothing to bake in at build time and
    # nothing that can point at an unreachable host when offline.
    #
    # The backend runs with network_mode: host (required for BlueZ/D-Bus
    # Bluetooth access), so from inside this bridge-networked container
    # it's reached via the host gateway, not a compose service name.
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Telemetry streams continuously with no client->server traffic,
        # so without a long timeout nginx would drop the socket after 60s.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
