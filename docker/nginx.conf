server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # nginx's default mime.types has NO entry for .webmanifest at all,
    # so without this it's served as application/octet-stream - and
    # Chrome silently refuses to treat a site as installable when the
    # manifest isn't served with a recognized manifest type. There's no
    # error shown for this; the install option just quietly never
    # appears, which is exactly what was happening here.
    #
    # Two things this got wrong before landing here, both caught by
    # actually testing against a real nginx rather than trusting the
    # config's syntax check:
    #   1. add_header does NOT override nginx's own MIME-type detection
    #      for static files - it only adds an extra header, producing
    #      two conflicting Content-Type headers in the response.
    #   2. A `types {}` block at the server level REPLACES the entire
    #      inherited MIME table for that scope, not merges with it -
    #      every other file on the site (JS/CSS/HTML/PNG) started
    #      coming back as application/octet-stream too. Scoping it to
    #      a location that only ever matches .webmanifest requests
    #      contains the override to exactly what it's meant for.
    location ~* \.webmanifest$ {
        types {
            application/manifest+json webmanifest;
        }
        try_files $uri =404;
    }

    # Proxy the API and WebSocket through the SAME origin the app is
    # served from. This is what makes the dashboard work identically on
    # the van's LAN (no internet) and through a Cloudflare Tunnel - the
    # frontend uses relative paths and never needs to know an absolute
    # backend address, so there's nothing to bake in at build time and
    # nothing that can point at an unreachable host when offline.
    #
    # The backend runs with network_mode: host (required for BlueZ/D-Bus
    # Bluetooth access), so from inside this bridge-networked container
    # it's reached via the host gateway, not a compose service name.
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # Telemetry streams continuously with no client->server traffic,
        # so without a long timeout nginx would drop the socket after 60s.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Same-origin proxy for the CCTV camera relay (go2rtc). Two things
    # this fixes at once:
    #   1. Mixed content: go2rtc has no TLS configured, so an absolute
    #      http:// URL to it gets silently blocked by browsers when the
    #      dashboard itself is loaded over https:// (via the Cloudflare
    #      Tunnel). Same-origin means it's always the page's own
    #      protocol, never a mismatch.
    #   2. Raw WebRTC can't traverse the tunnel (it's peer-to-peer UDP,
    #      not a proxyable HTTP request) - but go2rtc's MSE fallback IS
    #      WebSocket-based, same transport style as /ws/ above, so
    #      proxying it here is what actually lets that fallback work
    #      remotely instead of only on the van's own WiFi.
    #
    # go2rtc's own network_mode: host, reached the same way as the
    # backend - via the host gateway, not a compose service name.
    # base_path in go2rtc.yaml tells it to expect this /camera prefix.
    location /camera/ {
        proxy_pass http://host.docker.internal:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
